<style>
:root {
  --bg:#0d0d0f; --surface:#141416; --surface2:#1c1c20;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --text:#f0ede6; --muted:#8a8780; --dim:#a08c6e;
  --gold:#c9a84c; --silver:#9ba8b0; --bronze:#a0653a; --accent:#e8d5a3;
  --red:#e8474a; --green:#4caf7d;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
.grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;}
.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
header{text-align:center;margin-bottom:2.5rem;}
.logo-line{display:flex;align-items:center;justify-content:center;gap:0.9rem;margin-bottom:0.4rem;}
.film-icon{width:26px;height:26px;opacity:0.55;flex-shrink:0;}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,2.8rem);font-weight:700;letter-spacing:-0.02em;line-height:1;}
h1 em{font-style:italic;color:var(--gold);}
.subtitle{font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:0.5rem;}
.year-badge{display:inline-block;font-size:0.75rem;color:var(--gold);border:0.5px solid var(--gold);border-radius:3px;padding:0.12rem 0.35rem;margin-left:0.4rem;opacity:0.75;}
.days-badge{display:inline-block;font-size:0.75rem;color:var(--muted);border:0.5px solid var(--muted);border-radius:3px;padding:0.12rem 0.35rem;margin-left:0.4rem;opacity:0.75;}
.auth-bar{display:flex;align-items:center;justify-content:flex-end;gap:0.75rem;margin-bottom:2rem;min-height:36px;}
.user-pill{display:flex;align-items:center;gap:0.5rem;background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:0.3rem 0.75rem 0.3rem 0.4rem;}
.user-pill-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;border:0.5px solid var(--border2);}
.user-pill-name{font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--muted);}
.btn-auth{font-family:'DM Mono',monospace;font-size:0.85rem;letter-spacing:0.05em;padding:0.45rem 1rem;border-radius:6px;cursor:pointer;transition:all 0.15s;border:0.5px solid;}
.btn-login{background:var(--surface2);border-color:var(--gold);color:var(--gold);}
.btn-login:hover{background:var(--gold);color:var(--bg);}
.btn-logout{background:none;border-color:var(--border2);color:var(--dim);}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.login-screen{text-align:center;padding:4rem 1rem;}
.login-icon{font-size:3rem;opacity:0.25;margin-bottom:1.5rem;}
.login-screen h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;margin-bottom:0.75rem;color:var(--text);}
.login-screen p{font-size:0.95rem;color:var(--muted);margin-bottom:2rem;line-height:1.6;max-width:300px;margin-left:auto;margin-right:auto;}
.btn-google{display:inline-flex;align-items:center;gap:0.6rem;background:var(--surface);border:0.5px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;transition:all 0.15s;}
.btn-google:hover{border-color:var(--gold);color:var(--gold);}
.btn-google svg{flex-shrink:0;}
.section-label{font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text);margin-bottom:0.9rem;display:flex;align-items:center;gap:0.7rem;}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--border);}
.divider{height:0.5px;background:var(--border);margin:2rem 0;}
.add-form{display:flex;gap:0.55rem;align-items:stretch;}
.input-wrap{flex:1;position:relative;}
.input-prefix{position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);font-family:'DM Mono',monospace;font-size:0.9rem;color:var(--text);pointer-events:none;}
input[type=text]{width:100%;background:var(--surface);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;padding:0.68rem 0.8rem 0.68rem 2.5rem;outline:none;transition:border-color 0.15s;}
input[type=text]::placeholder{color:var(--text);}
input[type=text]:focus{border-color:var(--gold);}
.btn-add{background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:0.85rem;letter-spacing:0.04em;padding:0 1.1rem;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.btn-add:hover{border-color:var(--gold);color:var(--gold);}
.btn-add:disabled{opacity:0.35;cursor:not-allowed;}
.msg{margin-top:0.55rem;font-family:'DM Mono',monospace;font-size:0.8rem;min-height:1rem;letter-spacing:0.02em;}
.msg.ok{color:var(--green);}.msg.err{color:var(--red);}
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:0.7rem;min-height:270px;padding:0 0.3rem;}
.podium-slot{flex:1;max-width:195px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.55s ease both;}
.podium-slot:nth-child(1){animation-delay:0.08s;}
.podium-slot:nth-child(2){animation-delay:0s;}
.podium-slot:nth-child(3){animation-delay:0.16s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.user-card{width:100%;padding:0.95rem 0.65rem 0.8rem;background:var(--surface);border:0.5px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;text-align:center;position:relative;}
.user-card.rank-1{border-color:var(--gold);border-width:1px;}
.user-card.rank-2{border-color:var(--silver);}
.user-card.rank-3{border-color:var(--bronze);}
.avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 0.55rem;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;border:2px solid;background:var(--surface2);overflow:hidden;flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.rank-1 .avatar{border-color:var(--gold);color:var(--gold);}
.rank-2 .avatar{border-color:var(--silver);color:var(--silver);}
.rank-3 .avatar{border-color:var(--bronze);color:var(--bronze);}
.uname{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.film-count{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;line-height:1.1;margin-top:0.28rem;}
.rank-1 .film-count{color:var(--gold);}.rank-2 .film-count{color:var(--silver);}.rank-3 .film-count{color:var(--bronze);}
.films-label{font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:0.08rem;}
.medal{position:absolute;top:-0.65rem;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.65rem;border:1px solid;background:var(--bg);}
.rank-1 .medal{color:var(--gold);border-color:var(--gold);}
.rank-2 .medal{color:var(--silver);border-color:var(--silver);}
.rank-3 .medal{color:var(--bronze);border-color:var(--bronze);}
.podium-block{width:100%;border-radius:0 0 4px 4px;display:flex;align-items:flex-start;justify-content:center;padding-top:0.45rem;font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--dim);}
.pb-1{height:80px;background:#1a160e;border:0.5px solid var(--gold);border-top:none;}
.pb-2{height:52px;background:#151618;border:0.5px solid var(--silver);border-top:none;}
.pb-3{height:38px;background:#17130e;border:0.5px solid var(--bronze);border-top:none;}
.ps-left .user-card,.ps-left .podium-block{opacity:0.83;}
.ps-right .user-card,.ps-right .podium-block{opacity:0.68;}
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--muted);}
.empty-icon{font-size:2.2rem;margin-bottom:0.8rem;opacity:0.28;}
.empty-state p{font-size:0.9rem;line-height:1.65;max-width:260px;margin:0 auto;}
.spinner{width:22px;height:22px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.inline-spinner{display:inline-block;width:14px;height:14px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.85s linear infinite;vertical-align:middle;margin-right:0.4rem;}
.loading-full{display:flex;align-items:center;justify-content:center;padding:4rem 1rem;gap:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.85rem;}
.user-list{display:flex;flex-direction:column;gap:0.35rem;}
.user-row{display:flex;align-items:center;gap:0.85rem;padding:0.75rem 0.9rem;background:var(--surface);border:0.5px solid var(--border);border-radius:6px;transition:border-color 0.15s;animation:fadeUp 0.4s ease both;}
.user-row:hover{border-color:var(--border2);}
.row-rank{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--text);min-width:1.2rem;text-align:right;}
.row-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:0.5px solid var(--border2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--dim);}
.row-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.row-name{flex:1;font-family:'DM Mono',monospace;font-size:0.92rem;}
.row-name a{color:var(--text);text-decoration:none;}.row-name a:hover{color:var(--accent);}
.row-count{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--muted);min-width:2.8rem;text-align:right;}
.row-updated{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text);min-width:4rem;text-align:right;}
.row-actions{display:flex;gap:0.3rem;}
.btn-icon{background:none;border:0.5px solid transparent;color:var(--text);cursor:pointer;padding:0.22rem 0.3rem;border-radius:4px;font-size:0.8rem;transition:all 0.15s;line-height:1;}
.btn-icon:hover{color:var(--text);border-color:var(--border2);}
.btn-icon.danger:hover{color:var(--red);border-color:rgba(232,71,74,0.4);}
.btn-icon.spinning{animation:spin 0.75s linear infinite;}
.share-bar{display:flex;justify-content:flex-end;margin-top:1.5rem;}
.btn-share{display:inline-flex;align-items:center;gap:0.5rem;background:none;border:0.5px solid var(--gold);color:var(--gold);font-family:'DM Mono',monospace;font-size:0.78rem;letter-spacing:0.05em;padding:0.45rem 1rem;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.btn-share:hover{background:var(--gold);color:var(--bg);}
.share-cta{text-align:center;margin-top:2.5rem;padding-top:1.5rem;border-top:0.5px solid var(--border);}
.share-cta p{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);margin-bottom:1rem;}
.share-cta a{display:inline-flex;align-items:center;gap:0.5rem;background:var(--surface2);border:0.5px solid var(--gold);color:var(--gold);font-family:'DM Mono',monospace;font-size:0.8rem;padding:0.6rem 1.2rem;border-radius:6px;text-decoration:none;transition:all 0.15s;}
.share-cta a:hover{background:var(--gold);color:var(--bg);}
footer{text-align:center;font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--dim);letter-spacing:0.08em;margin-top:2.5rem;}
</style>
</head>

      <svg class="film-icon" viewBox="0 0 28 28" fill="none" style="transform:scaleX(-1)"><rect x="1" y="5" width="26" height="18" rx="2" stroke="currentColor" stroke-width="1"/><line x1="7" y1="5" x2="7" y2="23" stroke="currentColor" stroke-width="1"/><line x1="21" y1="5" x2="21" y2="23" stroke="currentColor" stroke-width="1"/><rect x="3" y="7" width="2" height="3" rx="0.5" fill="currentColor" opacity="0.5"/><rect x="3" y="12" width="2" height="3" rx="0.5" fill="currentColor" opacity="0.5"/><rect x="3" y="17" width="2" height="3" rx="0.5" fill="currentColor" opacity="0.5"/><rect x="23" y="7" width="2" height="3" rx="0.5" fill="currentColor" opacity="0.5"/><rect x="23" y="12" width="2" height="3" rx="0.5" fill="currentColor" opacity="0.5"/><rect x="23" y="17" width="2" height="3" rx="0.5" fill="currentColor" opacity="0.5"/></svg>

<script>
const YEAR = new Date().getFullYear();
const endOfYear = new Date(YEAR, 11, 31);
const daysLeft = Math.ceil((endOfYear - new Date()) / (1000 * 60 * 60 * 24));
document.getElementById('year-label').textContent = YEAR;
document.getElementById('days-label').textContent = daysLeft + 'd para el cierre';

const CLERK_KEY = 'pk_test_bmV3LWdudS0xNC5jbGVyay5hY2NvdW50cy5kZXYk';
const SHARE_UID = new URLSearchParams(window.location.search).get('uid');

let clerk = null;
let users = {};
let fetching = new Set();

function ini(n) { return n.substring(0,2).toUpperCase(); }

function timeAgo(ts) {
  if (!ts) return '';
  const m = Math.floor((Date.now()-ts)/60000);
  if (m < 1) return 'ahora';
  if (m < 60) return m + 'm';
  const h = Math.floor(m/60);
  if (h < 24) return h + 'h';
  return Math.floor(h/24) + 'd';
}

function avatarHtml(user) {
  if (user.avatar) {
    return '<img src="' + user.avatar + '" alt="@' + user.username + '" onerror="this.parentElement.textContent=\'' + ini(user.username) + '\'">';
  }
  return ini(user.username);
}

// ---- SHARE MODE ----
if (SHARE_UID) {
  document.getElementById('auth-bar').style.display = 'none';
  document.getElementById('add-section').style.display = 'none';
  document.getElementById('add-divider').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('share-cta').style.display = 'block';

  fetch('/api/share?uid=' + encodeURIComponent(SHARE_UID))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) throw new Error(data.error);
      var name = data.profile ? data.profile.display_name : 'este usuario';
      document.title = 'Cinepodio de ' + name;
      document.getElementById('podio-label').textContent = 'Podio de ' + name;
      var entries = data.entries.map(function(e) {
        return { username: e.letterboxd_username, count: e.film_count, avatar: e.avatar_url };
      });
      renderPodium(entries.slice().sort(function(a,b){ return b.count - a.count; }));
      renderSharedList(entries.slice().sort(function(a,b){ return b.count - a.count; }));
    })
    .catch(function(e) {
      document.getElementById('podium-container').innerHTML =
        '<div class="empty-state"><p style="color:var(--red)">No se pudo cargar el podio.</p></div>';
    });
}

// ---- CLERK / AUTH ----
async function initClerk() {
  if (SHARE_UID) return;
  clerk = window.Clerk;
  await clerk.load({ publishableKey: CLERK_KEY });
  clerk.addListener(function(state) {
    if (state.user) showApp(state.user);
    else showLogin();
  });
  if (clerk.user) showApp(clerk.user);
  else showLogin();
}

function showLogin() {
  document.getElementById('auth-bar').innerHTML = '';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('btn-sign-in').onclick = function() { clerk.openSignIn({}); };
}

function showApp(user) {
  var name = user.firstName || (user.emailAddresses[0] && user.emailAddresses[0].emailAddress.split('@')[0]) || 'usuario';
  var avatar = user.imageUrl || '';
  document.getElementById('auth-bar').innerHTML =
    '<div class="user-pill">' +
    (avatar ? '<img class="user-pill-avatar" src="' + avatar + '" alt="' + name + '">' : '') +
    '<span class="user-pill-name">' + name + '</span></div>' +
    '<button class="btn-auth btn-logout" id="btn-logout">salir</button>';
  document.getElementById('btn-logout').onclick = function() { clerk.signOut(); };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  saveProfile(user);
  loadPodio();
}

async function getToken() {
  return await clerk.session.getToken();
}

async function apiFetch(method, path, body) {
  var token = await getToken();
  var res = await fetch(path, {
    method: method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    var err = await res.json().catch(function() { return {}; });
    throw new Error(err.error || ('Error ' + res.status));
  }
  return res.json();
}

async function saveProfile(user) {
  try {
    var name = user.firstName || (user.emailAddresses[0] && user.emailAddresses[0].emailAddress.split('@')[0]) || 'usuario';
    await apiFetch('POST', '/api/podio', { profile: { display_name: name, avatar_url: user.imageUrl || null } });
  } catch(e) { console.warn('Could not save profile', e); }
}

function getShareLink() {
  if (!clerk || !clerk.user) return null;
  return window.location.origin + '/?uid=' + encodeURIComponent(clerk.user.id);
}

async function copyShareLink() {
  var link = getShareLink();
  if (!link) return;
  try {
    await navigator.clipboard.writeText(link);
    setMsg('Link copiado al portapapeles ✓', 'ok');
  } catch(e) {
    setMsg(link, 'ok');
  }
}

async function loadPodio() {
  document.getElementById('podium-container').innerHTML =
    '<div class="loading-full"><div class="spinner"></div> cargando tu podio...</div>';
  try {
    var entries = await apiFetch('GET', '/api/podio');
    users = {};
    entries.forEach(function(e) {
      users[e.letterboxd_username] = {
        username: e.letterboxd_username,
        count: e.film_count,
        avatar: e.avatar_url,
        lastUpdated: e.last_updated ? new Date(e.last_updated).getTime() : null,
      };
    });
    render();
  } catch(e) {
    document.getElementById('podium-container').innerHTML =
      '<div class="empty-state"><p style="color:var(--red)">Error al cargar: ' + e.message + '</p></div>';
  }
}

async function saveToDB(username, count, avatar) {
  await apiFetch('POST', '/api/podio', { letterboxd_username: username, film_count: count, avatar_url: avatar || null });
}

async function deleteFromDB(username) {
  await apiFetch('DELETE', '/api/podio?username=' + encodeURIComponent(username));
}

async function fetchUserData(username) {
  var res = await fetch('/api/letterboxd?username=' + encodeURIComponent(username) + '&year=' + YEAR);
  var data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Error desconocido');
  return { count: data.count, avatar: data.avatar || null };
}

function setMsg(txt, type) {
  var el = document.getElementById('msg');
  if (!el) return;
  el.textContent = txt;
  el.className = 'msg' + (type ? ' ' + type : '');
}

async function addUser() {
  var input = document.getElementById('username-input');
  var btn = document.getElementById('add-btn');
  var raw = input.value.trim().toLowerCase().replace('@','').replace(/[^a-z0-9_-]/g,'');
  if (!raw) { setMsg('Ingresá un nombre de usuario', 'err'); return; }
  if (users[raw]) { setMsg('Este usuario ya está en tu podio', 'err'); return; }
  if (fetching.has(raw)) return;
  btn.disabled = true;
  fetching.add(raw);
  setMsg('Buscando películas de @' + raw + '...', '');
  try {
    var data = await fetchUserData(raw);
    await saveToDB(raw, data.count, data.avatar);
    users[raw] = { username: raw, count: data.count, avatar: data.avatar, lastUpdated: Date.now() };
    input.value = '';
    fetching.delete(raw);
    btn.disabled = false;
    setMsg('@' + raw + ' agregado — ' + data.count + ' película' + (data.count !== 1 ? 's' : '') + ' en ' + YEAR + ' ✓', 'ok');
    render();
  } catch(e) {
    fetching.delete(raw);
    btn.disabled = false;
    setMsg(e.message, 'err');
  }
}

async function refreshUser(username) {
  if (fetching.has(username)) return;
  fetching.add(username);
  render();
  try {
    var data = await fetchUserData(username);
    await saveToDB(username, data.count, data.avatar);
    users[username] = Object.assign({}, users[username], { count: data.count, avatar: data.avatar, lastUpdated: Date.now() });
    setMsg('@' + username + ' actualizado — ' + data.count + ' películas', 'ok');
  } catch(e) {
    setMsg('Error al actualizar @' + username + ': ' + e.message, 'err');
  }
  fetching.delete(username);
  render();
}

async function removeUser(username) {
  if (!confirm('¿Eliminar a @' + username + ' de tu podio?')) return;
  try {
    await deleteFromDB(username);
    delete users[username];
    render();
  } catch(e) {
    setMsg('Error al eliminar: ' + e.message, 'err');
  }
}

function render() {
  var sorted = Object.values(users).sort(function(a,b){ return b.count - a.count; });
  var shareBar = document.getElementById('share-bar');
  if (shareBar) shareBar.style.display = sorted.length > 0 ? 'flex' : 'none';
  var refreshBar = document.getElementById('refresh-all-bar');
  if (refreshBar) refreshBar.style.display = sorted.length > 0 ? 'flex' : 'none';
  renderPodium(sorted);
  renderList(sorted);
}

function renderPodium(sorted) {
  var el = document.getElementById('podium-container');
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎞</div><p>Agregá usuarios de Letterboxd para ver tu podio del año.</p></div>';
    return;
  }
  var order, ranks, slotClasses;
  if (sorted.length >= 3) { order=[sorted[1],sorted[0],sorted[2]]; ranks=[2,1,3]; slotClasses=['ps-left','ps-center','ps-right']; }
  else if (sorted.length === 2) { order=[sorted[1],sorted[0]]; ranks=[2,1]; slotClasses=['ps-left','ps-center']; }
  else { order=[sorted[0]]; ranks=[1]; slotClasses=['ps-center']; }
  var rl=['I','II','III'], cr={1:'rank-1',2:'rank-2',3:'rank-3'}, pb={1:'pb-1',2:'pb-2',3:'pb-3'};
  var slots = order.map(function(user,i) {
    var rank=ranks[i], isLoading=fetching.has(user.username);
    var countHtml = isLoading
      ? '<div style="display:flex;justify-content:center;margin-top:0.4rem;"><div class="spinner" style="width:18px;height:18px;"></div></div>'
      : '<div class="film-count">' + user.count + '</div><div class="films-label">películas</div>';
    return '<div class="podium-slot ' + slotClasses[i] + '">' +
      '<div class="user-card ' + cr[rank] + '">' +
      '<div class="medal">' + rl[rank-1] + '</div>' +
      '<div class="avatar">' + avatarHtml(user) + '</div>' +
      '<div class="uname">@' + user.username + '</div>' +
      countHtml + '</div>' +
      '<div class="podium-block ' + pb[rank] + '">' + rl[rank-1] + '</div></div>';
  });
  el.innerHTML = '<div class="podium-wrap">' + slots.join('') + '</div>';
}

function renderList(sorted) {
  var sec = document.getElementById('list-section');
  var listEl = document.getElementById('user-list');
  if (!sorted.length) { sec.style.display='none'; return; }
  sec.style.display='block';
  listEl.innerHTML = sorted.map(function(user,i) {
    var isLoading=fetching.has(user.username);
    var countDisplay = isLoading ? '<span class="inline-spinner"></span>' : user.count;
    var rowAvatar = user.avatar
      ? '<div class="row-avatar"><img src="' + user.avatar + '" alt="@' + user.username + '" onerror="this.parentElement.textContent=\'' + ini(user.username) + '\'"></div>'
      : '<div class="row-avatar">' + ini(user.username) + '</div>';
    return '<div class="user-row" style="animation-delay:' + i*0.04 + 's">' +
      '<div class="row-rank">' + (i+1) + '</div>' + rowAvatar +
      '<div class="row-name"><a href="https://letterboxd.com/' + user.username + '" target="_blank">@' + user.username + '</a></div>' +
      '<div class="row-count">' + countDisplay + '</div>' +
      '<div class="row-updated">' + timeAgo(user.lastUpdated) + '</div>' +
      '<div class="row-actions">' +
      '<button class="btn-icon ' + (isLoading?'spinning':'') + '" title="Actualizar" onclick="refreshUser(\'' + user.username + '\')">↻</button>' +
      '<button class="btn-icon danger" title="Eliminar" onclick="removeUser(\'' + user.username + '\')">✕</button>' +
      '</div></div>';
  }).join('');
}

function renderSharedList(sorted) {
  var sec = document.getElementById('list-section');
  var listEl = document.getElementById('user-list');
  if (!sorted.length) { sec.style.display='none'; return; }
  sec.style.display='block';
  listEl.innerHTML = sorted.map(function(user,i) {
    var rowAvatar = user.avatar
      ? '<div class="row-avatar"><img src="' + user.avatar + '" alt="@' + user.username + '" onerror="this.parentElement.textContent=\'' + ini(user.username) + '\'"></div>'
      : '<div class="row-avatar">' + ini(user.username) + '</div>';
    return '<div class="user-row" style="animation-delay:' + i*0.04 + 's">' +
      '<div class="row-rank">' + (i+1) + '</div>' + rowAvatar +
      '<div class="row-name"><a href="https://letterboxd.com/' + user.username + '" target="_blank">@' + user.username + '</a></div>' +
      '<div class="row-count">' + user.count + '</div></div>';
  }).join('');
}

async function refreshAll() {
  var btn = document.getElementById('refresh-all-btn');
  btn.disabled = true;
  btn.textContent = '↻ actualizando...';
  var usernames = Object.keys(users);
  for (var i = 0; i < usernames.length; i++) {
    var username = usernames[i];
    if (fetching.has(username)) continue;
    fetching.add(username);
    render();
    try {
      var data = await fetchUserData(username);
      await saveToDB(username, data.count, data.avatar);
      users[username] = Object.assign({}, users[username], { count: data.count, avatar: data.avatar, lastUpdated: Date.now() });
    } catch(e) {
      console.warn('Error actualizando @' + username, e);
    }
    fetching.delete(username);
    render();
  }
  btn.disabled = false;
  btn.textContent = '↻ actualizar todos';
  setMsg('Todos los usuarios actualizados ✓', 'ok');
}

document.getElementById('add-btn').addEventListener('click', addUser);
document.getElementById('username-input').addEventListener('keydown', function(e) { if(e.key==='Enter') addUser(); });
</script>
</body>
</html>
